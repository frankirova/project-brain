schema: spec-driven

project: project-brain
artifact_store:
  mode: openspec
execution_mode: interactive
chained_pr_strategy: auto-forecast
review_budget_lines: 400
detected: 2026-06-09

context: |
  Tech stack: Go 1.25, PostgreSQL, pgvector, PostgreSQL FTS, Gemini embeddings, Telegram Bot API, MCP stdio tools, slog, and Docker-based deployment.
  Architecture: hexagonal knowledge platform with domain/app/infra/adapters layers, PostgreSQL-first knowledge core, hybrid retrieval, graph-like relations, collision detection, and auditable knowledge artifacts.
  Testing: Go unit tests are available via `go test ./...`; PostgreSQL integration tests are env-gated via `PROJECT_BRAIN_TEST_DATABASE_DSN`.
  Style: documentation-first SDD/OpenSpec workflow; Spanish product source document, English SDD artifacts unless requested otherwise.

strict_tdd: false

testing:
  strict_tdd: false
  reason: "Go codebase and test runner are available; strict TDD remains disabled until explicitly enabled for this project."
  detected_at: 2026-06-09
  runner:
    available: true
    framework: go test
    command: go test ./...
  layers:
    unit:
      available: true
      tool: go test ./...
    integration:
      available: true
      tool: PROJECT_BRAIN_TEST_DATABASE_DSN=<dsn> go test ./internal/postgres
    e2e:
      available: false
      tool: null
  coverage:
    available: false
    command: null
  quality:
    linter:
      available: false
      command: null
    type_checker:
      available: true
      command: go vet ./...
    formatter:
      available: true
      command: gofmt -w .

rules:
  proposal:
    - Lead with the intended outcome and scope before background.
    - Include rollback plan for risky changes.
  specs:
    - Use RFC 2119 keywords: MUST, SHALL, SHOULD, MAY.
    - Use Given/When/Then scenarios for observable behavior.
  design:
    - Document architecture decisions with rationale, alternatives, consequences, and risks.
    - Include sequence diagrams for complex event-driven or multi-agent flows.
  tasks:
    - Group by phase and keep tasks completable in one focused session.
    - Forecast review size; split work when it is likely to exceed 400 changed lines.
  apply:
    - Follow existing code and documentation patterns.
    tdd: false
    test_command: "go test ./..."
  verify:
    test_command: "go test ./..."
    build_command: "go build ./cmd/api ./cmd/mcp"
    coverage_threshold: 0
  archive:
    - Preserve archived changes as audit trail; do not delete or rewrite archives.
