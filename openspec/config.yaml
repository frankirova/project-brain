rules:
  proposal:
    - Lead with the intended outcome and scope before background.
    - Include rollback plan for risky changes.
  specs:
    - Use RFC 2119 keywords: MUST, SHALL, SHOULD, MAY.
    - Use Given/When/Then scenarios for observable behavior.
  design:
    - Document architecture decisions with rationale, alternatives, consequences, and risks.
    - Include sequence diagrams for complex event-driven or multi-agent flows.
  tasks:
    - Group by phase and keep tasks completable in one focused session.
    - Forecast review size; split work when it is likely to exceed 400 changed lines.
  apply:
    - Follow existing code and documentation patterns.
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Preserve archived changes as audit trail; do not delete or rewrite archives.
