services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: project_brain
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Schema lifecycle is owned by the API (see internal/migrations):
      # migrations are applied on API startup, not by the Postgres
      # initdb hook. The pgdata volume holds DATA only — schema
      # ownership lives in the API process.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project_brain"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8050:8050"
    environment:
      PROJECT_BRAIN_DATABASE_DSN: "postgres://postgres:postgres@postgres:5432/project_brain?sslmode=disable"
    # Loads PROJECT_BRAIN_GEMINI_API_KEY (and any other secrets) from a
    # local .env file. required:false so the stack still starts without it.
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
