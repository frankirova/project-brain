services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: project_brain
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8050:8050"
    environment:
      PROJECT_BRAIN_DATABASE_DSN: "postgres://postgres:postgres@postgres:5432/project_brain?sslmode=disable"
    depends_on:
      - postgres

volumes:
  pgdata:
