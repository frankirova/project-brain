name: ci

# Run on pushes to main and on any pull request targeting main. This is the
# minimum CI baseline (gofmt + vet + short tests) established by change-16
# PR5; PRs that touch repo hygiene will fail fast here on the first push.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# To run the same checks locally before pushing:
#   gofmt -l .              # must print nothing
#   go vet ./...
#   go test -short -count=1 ./...
jobs:
  build:
    name: build (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Matches go.mod:3 — widen later (e.g. ["1.24.x", "1.25.x"]) once
        # the project formally supports more than one toolchain.
        go-version: ["1.25.x"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      # gofmt -l prints the names of unformatted files. Piping through
      # `(! grep .)` inverts the exit code so a non-empty listing fails
      # the step (grep -q exits 1 on no match, `!` flips it to 0).
      - name: gofmt
        run: gofmt -l . | (! grep .)

      - name: go vet
        run: go vet ./...

      - name: go test (short)
        run: go test -short -count=1 ./...
